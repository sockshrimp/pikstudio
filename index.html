<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIK STUDIO</title>

<meta name="description" content="PIK Studio — Coming Soon">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    color:#000;
}

.container{
    width:90%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.logo{
    width:100%;
    max-width:700px;
    margin-bottom:60px;
}

.logo img{
    width:100%;
    display:block;
    opacity:0;
    animation:fadeIn 1.2s ease forwards;
    animation-delay:0.2s;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:clamp(42px,6vw,72px);
    letter-spacing:8px;
    font-weight:900;
    margin-bottom:40px;
}

.instagram-btn{
    display:inline-flex;
    align-items:center;
    gap:14px;

    text-decoration:none;
    color:#000;

    border:2px solid #000;
    border-radius:10px;

    padding:18px 34px;

    font-weight:700;
    font-size:18px;

    transition:all .3s cubic-bezier(0.4,0,0.2,1);
}

.instagram-btn svg{
    width:28px;
    height:28px;
}

.instagram-btn:hover{
    background:#000;
    color:#fff;
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.instagram-btn:hover svg{
    stroke:white;
}

.footer{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:13px;
    color:#777;
    letter-spacing:2px;
}

@media (max-width:700px){

.logo{
    margin-bottom:45px;
}

h1{
    letter-spacing:4px;
    margin-bottom:35px;
}

.instagram-btn{
    width:100%;
    justify-content:center;
    font-size:16px;
}

}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="assets/logo.png" alt="PIK Studio">
    </div>

    <h1>COMING SOON</h1>

    <a
        class="instagram-btn"
        href="https://www.instagram.com/pikstudio.adl"
        target="_blank"
        rel="noopener noreferrer">

        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="1"></circle>
        </svg>

        Follow us on Instagram

    </a>

</div>

<div class="footer">
PIK STUDIO
</div>

</body>
</html>
